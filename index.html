<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Infernal Wager</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08060a;--s1:#110e16;--s2:#181422;--s3:#221c2e;
  --blood:#c22038;--bh:#e8425a;
  --ember:#d4882a;--eh:#f0b840;
  --bone:#e8dcc8;--bd:#a89878;
  --dim:#887898;--txt:#f0e8dc;--t2:#c8b8a4;
  --brd:#342a44;--b2:#483c5c;
  --vio:#9955dd;--grn:#44a055;--gh:#5cc870;
  --panel:rgba(12,9,18,.96);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:'Cormorant Garamond',Georgia,serif;font-size:17px}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:6px}

#root{position:relative;width:100%;height:100%;overflow:hidden}
#bgCanvas{position:absolute;inset:0;width:100%;height:100%}
#fxCanvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2}
#hud{position:absolute;inset:0;pointer-events:none;display:flex;flex-direction:column;z-index:3}
#hud>*{pointer-events:auto}

#toasts{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);z-index:100;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
.toast{padding:10px 24px;border-radius:8px;font-size:15px;color:var(--bone);background:var(--panel);border:1px solid var(--brd);animation:tIn .3s ease,tOut .4s ease 2.8s forwards;white-space:nowrap;font-family:'Cinzel',serif;letter-spacing:.05em}
@keyframes tIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes tOut{to{opacity:0;transform:translateY(-10px)}}

#fadeOverlay{position:absolute;inset:0;background:var(--bg);z-index:200;pointer-events:none;opacity:0;transition:opacity .6s ease}
#fadeOverlay.active{opacity:1}

#tutOverlay{position:fixed;inset:0;z-index:300;pointer-events:none;display:none}
#tutOverlay.active{display:block}
#tutDim{position:absolute;inset:0;background:rgba(4,3,6,.85);transition:opacity .3s}
#tutDim.passthrough{opacity:0;pointer-events:none}
#tutBox{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);width:94%;max-width:520px;background:var(--panel);border:1px solid var(--brd);border-radius:16px;padding:24px 28px;box-shadow:0 12px 48px rgba(0,0,0,.7);pointer-events:auto}
#tutTitle{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--bh);letter-spacing:.15em;text-transform:uppercase;margin-bottom:10px}
#tutText{font-size:17px;color:var(--t2);line-height:1.6;margin-bottom:18px}
#tutText .hl{color:var(--eh);font-family:'Cinzel',serif;font-weight:700}
#tutText .bl{color:var(--bh);font-weight:600}
#tutText .vl{color:#b866ee;font-weight:600}
#tutActions{display:flex;justify-content:flex-end;gap:10px}
#tutStep{font-family:'Cinzel',serif;font-size:11px;color:var(--dim);letter-spacing:.15em;position:absolute;top:14px;right:20px}
#tutHighlight{position:absolute;border:2px solid var(--bh);border-radius:14px;box-shadow:0 0 30px rgba(194,32,56,.3);pointer-events:none;transition:all .4s ease;display:none}

.ht{display:flex;justify-content:center;padding:14px 20px;gap:12px;flex-wrap:wrap;align-items:center}
.hm{flex:1;display:flex;align-items:center;justify-content:center;pointer-events:none;overflow-y:auto}
.hm>*{pointer-events:auto}
.hb{display:flex;flex-direction:column;align-items:center;padding:0 20px 14px;gap:8px}

.gl{background:var(--panel);border:1px solid var(--brd);border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,.6)}
.g2{background:var(--panel);border:1px solid var(--brd);border-radius:16px;box-shadow:0 12px 48px rgba(0,0,0,.7)}

.ph{padding:8px 24px;font-family:'Cinzel',serif;font-size:13px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;border-radius:24px;display:inline-block}
.ph.m{color:#b866ee;background:rgba(136,68,204,.1);border:1px solid rgba(136,68,204,.25)}
.ph.b{color:var(--eh);background:rgba(212,136,42,.1);border:1px solid rgba(212,136,42,.25)}
.ph.r{color:var(--bh);background:rgba(194,32,56,.1);border:1px solid rgba(194,32,56,.25)}
.ph.w{color:var(--bd);background:rgba(168,152,120,.08);border:1px solid rgba(168,152,120,.15)}

.cb{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.ct{padding:6px 14px;font-size:15px;display:inline-flex;align-items:center;gap:6px;border-radius:24px;background:rgba(17,14,22,.85);border:1px solid var(--brd)}
.ct.me{border-color:rgba(194,32,56,.5);background:rgba(194,32,56,.08)}
.ct .s{font-family:'Cinzel',serif;font-weight:700;color:var(--eh);font-size:16px}

.cp{max-width:600px;width:94%;padding:32px;text-align:center;max-height:82vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--brd) transparent}

.lb{font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:var(--dim);letter-spacing:.22em;text-transform:uppercase;text-align:center;margin-bottom:14px}
.hd{font-family:'Cinzel',serif;font-weight:700;letter-spacing:.06em}
.info{text-align:center;padding:6px;font-size:17px;color:var(--t2);line-height:1.5}
.info .hl{color:var(--eh);font-family:'Cinzel',serif;font-weight:700}
.info .bl{color:var(--bh);font-weight:600}
.info .ok{color:var(--gh);font-weight:600}

.btn{font-family:'Cinzel',serif;font-size:15px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:14px 28px;border:none;border-radius:10px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.1),transparent 60%);pointer-events:none;border-radius:inherit}
.btn:hover{transform:translateY(-2px)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.25;cursor:not-allowed;transform:none}
.btn-bl{background:linear-gradient(135deg,#8a1828,#c22038,#e8425a);color:white;box-shadow:0 4px 20px rgba(194,32,56,.35)}
.btn-bl:hover{box-shadow:0 6px 28px rgba(194,32,56,.5)}
.btn-em{background:linear-gradient(135deg,#a06818,#d4882a,#f0b840);color:#1a0e00;box-shadow:0 4px 20px rgba(212,136,42,.3)}
.btn-em:hover{box-shadow:0 6px 28px rgba(212,136,42,.5)}
.btn-gn{background:linear-gradient(135deg,#2a7838,#44a055);color:white;box-shadow:0 4px 16px rgba(68,160,85,.3)}
.btn-gn:hover{box-shadow:0 6px 24px rgba(68,160,85,.5)}
.btn-gh{background:rgba(255,255,255,.04);color:var(--t2);border:1px solid var(--brd)}
.btn-gh:hover{border-color:var(--b2);color:var(--txt);background:rgba(255,255,255,.07)}
.btn-gh::before{display:none}
.btn-big{font-size:16px;padding:18px 42px;border-radius:12px}
.btn-vio{background:linear-gradient(135deg,#6633aa,#9955dd,#b866ee);color:white;box-shadow:0 4px 20px rgba(136,68,204,.35)}
.btn-vio:hover{box-shadow:0 6px 28px rgba(136,68,204,.5)}
.acts{display:flex;justify-content:center;gap:12px;padding:10px 0;flex-wrap:wrap}

.inp{font-family:'Cinzel',serif;font-size:18px;text-align:center;width:100%;max-width:300px;padding:14px 18px;background:var(--s2);border:1px solid var(--brd);border-radius:10px;color:var(--txt);outline:none;display:block;margin:0 auto;transition:all .2s}
.inp::placeholder{color:var(--dim);font-style:italic;font-size:16px}
.inp:focus{border-color:var(--blood);box-shadow:0 0 0 3px rgba(194,32,56,.12)}
.inp-c{text-transform:uppercase;letter-spacing:.3em;font-size:20px;font-weight:700}
.inp-s{max-width:90px;padding:10px;margin:0;font-size:16px;border-radius:8px}

.ng{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:16px 0}
.nb{width:60px;height:60px;border-radius:12px;border:2px solid var(--brd);background:var(--s2);font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.nb:hover{border-color:var(--b2);background:var(--s3);transform:translateY(-2px)}
.nb.sel{border-color:var(--blood);background:rgba(194,32,56,.12);color:var(--bh);box-shadow:0 0 20px rgba(194,32,56,.25)}

.pt{display:inline-flex;padding:5px 12px;border-radius:8px;font-size:14px;background:var(--s2);margin:3px;border:1px solid var(--brd);font-family:'Cinzel',serif;letter-spacing:.04em;transition:all .2s}
.pt.on{border-color:var(--eh);color:var(--eh);box-shadow:0 0 10px rgba(240,184,64,.2);background:rgba(240,184,64,.06)}
.pt.off{opacity:.2;text-decoration:line-through}

.pot{text-align:center;padding:20px 0}
.pot-l{font-family:'Cinzel',serif;font-size:12px;font-weight:600;color:var(--dim);letter-spacing:.25em;text-transform:uppercase;margin-bottom:6px}
.pot-n{font-family:'Cinzel',serif;font-size:56px;font-weight:900;color:var(--eh);text-shadow:0 0 30px rgba(240,184,64,.2);line-height:1.1}

.rw{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04);font-size:16px;border-radius:8px;margin:2px 0}
.rw:last-child{border-bottom:none}
.rw .pn{font-family:'Cinzel',serif;font-weight:600;font-size:16px}
.rw .pn.me{color:var(--bh)}
.rw.win{background:rgba(240,184,64,.08);border:1px solid rgba(240,184,64,.12)}

.spy{background:rgba(136,68,204,.06);border:1px solid rgba(136,68,204,.2);border-radius:12px;padding:18px;margin:12px 0;text-align:center}
.cspy{background:rgba(194,32,56,.06);border:1px solid rgba(194,32,56,.2);border-radius:12px;padding:18px;margin:12px 0;text-align:center}
.badge{display:inline-block;padding:7px 18px;background:var(--s2);border:1px solid var(--brd);border-radius:24px;font-size:15px;color:var(--t2);font-family:'Cinzel',serif;letter-spacing:.04em}
.rule{display:flex;align-items:center;gap:14px;margin:22px 0;color:var(--b2)}
.rule::before,.rule::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--brd),transparent)}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--brd),transparent);margin:20px 0}

.pbw{padding:12px 0}
.pbr{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.pbc{text-align:center;width:48px}
.pbn{font-family:'Cinzel',serif;font-size:17px;font-weight:700;margin-bottom:4px}
.pbb{width:100%;height:70px;background:var(--s2);border-radius:8px;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.04)}
.pbf{position:absolute;bottom:0;width:100%;border-radius:6px 6px 0 0;transition:height .5s cubic-bezier(.4,0,.2,1)}
.pbp{font-size:12px;color:var(--dim);margin-top:4px}

.ww{position:relative;width:340px;height:340px;margin:20px auto}
.ww canvas{width:340px;height:340px;border-radius:50%}
.wp{position:absolute;top:-8px;left:50%;transform:translateX(-50%);z-index:5;width:0;height:0;border-left:13px solid transparent;border-right:13px solid transparent;border-top:26px solid var(--bh);filter:drop-shadow(0 2px 8px rgba(194,32,56,.5));transition:transform .05s}
.resn{font-family:'Cinzel',serif;font-weight:900;font-size:64px;text-align:center;line-height:1}

@keyframes tp{0%,100%{box-shadow:0 0 10px rgba(194,32,56,.1)}50%{box-shadow:0 0 24px rgba(194,32,56,.3)}}
.yt{animation:tp 2s ease infinite;border-radius:14px;padding:18px;border:1px solid rgba(194,32,56,.2);background:rgba(194,32,56,.03)}

@keyframes logoFade{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes logoGlow{0%,100%{text-shadow:0 0 20px rgba(194,32,56,.2)}50%{text-shadow:0 0 40px rgba(194,32,56,.4),0 0 80px rgba(194,32,56,.15)}}
@keyframes pulseBtn{0%,100%{box-shadow:0 4px 20px rgba(194,32,56,.35)}50%{box-shadow:0 4px 32px rgba(194,32,56,.55)}}
.title-anim{animation:logoFade .8s ease both,logoGlow 4s ease infinite .8s}
.subtitle-anim{animation:logoFade .8s ease .3s both}
.form-anim{animation:logoFade .6s ease .5s both}

.section-hd{font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:var(--bone);letter-spacing:.06em;margin-bottom:12px}
.code-display{font-family:'Cinzel',serif;font-size:40px;font-weight:900;letter-spacing:.3em;margin-bottom:24px;user-select:all;color:var(--eh);text-shadow:0 0 20px rgba(240,184,64,.15)}
.setting-row{display:flex;gap:20px;justify-content:center;margin-bottom:20px}
.setting-item{text-align:center;background:var(--s2);border:1px solid var(--brd);border-radius:12px;padding:14px 18px}

.tarot-wrap{perspective:900px;display:inline-block}
.tarot{display:inline-flex;flex-direction:column;width:180px;border-radius:12px;overflow:hidden;position:relative;transition:transform .3s,box-shadow .3s;transform-style:preserve-3d;cursor:default}
.tarot:hover{transform:translateY(-6px);box-shadow:0 16px 40px rgba(0,0,0,.5)}
.tarot canvas{width:180px;height:250px;display:block}
@keyframes cardFlip{0%{transform:rotateY(0)}50%{transform:rotateY(90deg)}100%{transform:rotateY(0)}}
.card-flip{animation:cardFlip .5s ease}

@media(max-width:600px){
  .cp{padding:20px;max-width:100%;width:98%}
  .tarot{width:150px}.tarot canvas{width:150px;height:208px}
  .ww{width:280px;height:280px}.ww canvas{width:280px;height:280px}
  .pbc{width:38px}.pbb{height:55px}
  .nb{width:52px;height:52px;font-size:19px}
  .pot-n{font-size:42px}.resn{font-size:48px}
  .code-display{font-size:30px}
  .btn{font-size:14px;padding:12px 22px}
  .btn-big{font-size:15px;padding:14px 32px}
  .info{font-size:16px}
  .ph{font-size:12px;padding:6px 18px}
  .ct{font-size:14px;padding:5px 12px}
  .rw{font-size:15px;padding:10px 12px}
  .rw .pn{font-size:15px}
}
</style>
</head>
<body>
<div id="root">
  <canvas id="bgCanvas"></canvas>
  <canvas id="fxCanvas"></canvas>
  <div id="hud"></div>
  <div id="toasts"></div>
  <div id="fadeOverlay"></div>
  <div id="tutOverlay">
    <div id="tutDim"></div>
    <div id="tutHighlight"></div>
    <div id="tutBox">
      <div id="tutStep"></div>
      <div id="tutTitle"></div>
      <div id="tutText"></div>
      <div id="tutActions"></div>
    </div>
  </div>
</div>

<script>
"use strict";
const Audio={ctx:null,masterGain:null,ambGain:null,started:false,
  init(){if(this.started)return;this.ctx=new(window.AudioContext||window.webkitAudioContext)();this.masterGain=this.ctx.createGain();this.masterGain.gain.value=0.4;this.masterGain.connect(this.ctx.destination);this.ambGain=this.ctx.createGain();this.ambGain.gain.value=0.12;this.ambGain.connect(this.masterGain);this.started=true;this.startAmbient()},
  startAmbient(){const osc=this.ctx.createOscillator();const g=this.ctx.createGain();osc.type='sine';osc.frequency.value=55;g.gain.value=0.3;const f=this.ctx.createBiquadFilter();f.type='lowpass';f.frequency.value=120;osc.connect(f);f.connect(g);g.connect(this.ambGain);osc.start();const o2=this.ctx.createOscillator();const g2=this.ctx.createGain();o2.type='sine';o2.frequency.value=82.5;g2.gain.value=0.15;const f2=this.ctx.createBiquadFilter();f2.type='lowpass';f2.frequency.value=100;o2.connect(f2);f2.connect(g2);g2.connect(this.ambGain);o2.start();const lfo=this.ctx.createOscillator();const lfoG=this.ctx.createGain();lfo.type='sine';lfo.frequency.value=0.08;lfoG.gain.value=0.05;lfo.connect(lfoG);lfoG.connect(g.gain);lfo.start()},
  play(type){if(!this.ctx)return;const t=this.ctx.currentTime;if(type==='tick'){const o=this.ctx.createOscillator();const g=this.ctx.createGain();o.type='sine';o.frequency.setValueAtTime(2000,t);o.frequency.exponentialRampToValueAtTime(500,t+.03);g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.05);o.connect(g);g.connect(this.masterGain);o.start(t);o.stop(t+.06)}else if(type==='chip'){const o=this.ctx.createOscillator();const g=this.ctx.createGain();o.type='sine';o.frequency.setValueAtTime(800+Math.random()*400,t);g.gain.setValueAtTime(.08,t);g.gain.exponentialRampToValueAtTime(.001,t+.1);o.connect(g);g.connect(this.masterGain);o.start(t);o.stop(t+.12)}else if(type==='card'){const n=this.ctx.createBufferSource();const buf=this.ctx.createBuffer(1,this.ctx.sampleRate*.08,this.ctx.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*.3));n.buffer=buf;const g=this.ctx.createGain();g.gain.value=.1;const f=this.ctx.createBiquadFilter();f.type='highpass';f.frequency.value=2000;n.connect(f);f.connect(g);g.connect(this.masterGain);n.start(t)}else if(type==='win'){[523.25,659.25,783.99].forEach((freq,i)=>{const o=this.ctx.createOscillator();const g=this.ctx.createGain();o.type='triangle';o.frequency.value=freq;g.gain.setValueAtTime(0,t+i*.08);g.gain.linearRampToValueAtTime(.12,t+i*.08+.05);g.gain.exponentialRampToValueAtTime(.001,t+i*.08+.5);o.connect(g);g.connect(this.masterGain);o.start(t+i*.08);o.stop(t+i*.08+.5)})}else if(type==='fold'){const o=this.ctx.createOscillator();const g=this.ctx.createGain();o.type='sine';o.frequency.setValueAtTime(300,t);o.frequency.exponentialRampToValueAtTime(100,t+.2);g.gain.setValueAtTime(.08,t);g.gain.exponentialRampToValueAtTime(.001,t+.25);o.connect(g);g.connect(this.masterGain);o.start(t);o.stop(t+.3)}else if(type==='reveal'){const o=this.ctx.createOscillator();const g=this.ctx.createGain();o.type='sine';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(600,t+.15);g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.2);o.connect(g);g.connect(this.masterGain);o.start(t);o.stop(t+.25)}}};
document.addEventListener('click',()=>Audio.init(),{once:false});
document.addEventListener('touchstart',()=>Audio.init(),{once:false});

const NC=['#e8425a','#d946a8','#b866ee','#8844cc','#6678e0','#42a8f5','#28d0e0','#2ab89e','#8ed44a','#d8e040','#f0b840','#d4882a'];
function getNC(n){return n.map((_,i)=>NC[i%NC.length])}
function getNums(pc){const n=[];for(let i=1;i<=pc*2;i++)n.push(i);return n}
function rollPow(){const r=Math.random();if(r<.5)return{tier:'Minor Hex',amount:5};if(r<.85)return{tier:'Dark Spell',amount:12};return{tier:'Grand Ritual',amount:20}}
function hexToRgb(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return{r,g,b}}
function noise(x,y){let n=Math.sin(x*12.9898+y*78.233)*43758.5453;return n-Math.floor(n)}

let particles=[],fxCtx,W,H;
function initFx(){const c=document.getElementById('fxCanvas');const dpr=window.devicePixelRatio||1;W=window.innerWidth;H=window.innerHeight;c.width=W*dpr;c.height=H*dpr;c.style.width=W+'px';c.style.height=H+'px';fxCtx=c.getContext('2d');fxCtx.scale(dpr,dpr)}
function seedParticles(){particles=[];for(let i=0;i<35;i++)particles.push({t:'e',x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.2,vy:-Math.random()*.4-.05,life:Math.random()*300+100,ml:400,sz:Math.random()*2+.5,c:Math.random()>.5?'194,32,56':'212,136,42'});for(let i=0;i<8;i++)particles.push({t:'s',x:Math.random()*W,y:H*.3+Math.random()*H*.4,vx:(Math.random()-.5)*.15,vy:-Math.random()*.15-.02,life:Math.random()*400+200,ml:600,sz:Math.random()*20+10,c:'180,170,160'})}
function spawnBurst(x,y,rgb,count,speed){for(let i=0;i<(count||15);i++){const a=Math.random()*Math.PI*2;const sp=(speed||2)+Math.random()*2;particles.push({t:'b',x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:40+Math.random()*30,ml:70,sz:Math.random()*2.5+1,c:rgb||'240,184,64'})}}
function spawnSoulRise(x,y,count){for(let i=0;i<(count||30);i++){const spread=60;particles.push({t:'soul',x:x+(Math.random()-.5)*spread,y:y+Math.random()*20,vx:(Math.random()-.5)*.8,vy:-Math.random()*2.5-1,life:60+Math.random()*40,ml:100,sz:Math.random()*3+1.5,c:'240,184,64'})}}

function sanitize(gs,who){if(!gs?.rnd)return gs;const s=JSON.parse(JSON.stringify(gs,(_,v)=>v instanceof Set?[...v]:v));const r=s.rnd;const rev=s.phase.startsWith('reveal')||s.phase==='gameover'||s.phase==='spinning'||s.phase==='spin_done';if(r.actedSinceRaise&&Array.isArray(r.actedSinceRaise))r.actedSinceRaise=new Set(r.actedSinceRaise);if(!rev){Object.keys(r.cards).forEach(p=>{if(p!==who)r.cards[p]=r.cards[p]?'hidden':null});if(s.saved)Object.keys(s.saved).forEach(p=>{if(p!==who)s.saved[p]=s.saved[p]?'hidden':null});if(r.spiesData)Object.keys(r.spiesData).forEach(sp=>{if(sp!==who)delete r.spiesData[sp]});if(r.counterSpiesData)Object.keys(r.counterSpiesData).forEach(t2=>{if(t2!==who)delete r.counterSpiesData[t2]})}if(s.phase==='pick')Object.keys(r.bn).forEach(p=>{if(p!==who&&r.bn[p])r.bn[p]='secret'});return s}

function mkRnd(gs){const pl=gs.players,nums=getNums(pl.length);const cards={},manip={},bn={},pb={},pf={};let cc=0;const gen=()=>{const ts=['boost','boost','nerf','nerf','cancel'];const t=ts[Math.floor(Math.random()*ts.length)];const tgt=nums[Math.floor(Math.random()*nums.length)];const pw=t==='cancel'?{tier:'Void Seal',amount:0}:rollPow();return{type:t,target:tgt,amount:pw.amount,tier:pw.tier}};pl.forEach(p=>{if(Math.random()<.65){cards[p]=gen();cc++}else cards[p]=null;manip[p]=null;bn[p]=0;pb[p]=0;pf[p]=false});if(cc===0&&pl.length>0){cards[pl[Math.floor(Math.random()*pl.length)]]=gen();cc++}const sd={},csd={};if(pl.length>1){let a=pl.filter(p=>!cards[p]),b=pl.filter(p=>cards[p]);a.sort(()=>Math.random()-.5);b.sort(()=>Math.random()-.5);let ca=[...a,...b];let ns=1;while(ns<ca.length&&Math.random()<.25)ns++;for(let i=0;i<ns;i++){let sp=ca[i],oth=pl.filter(p=>p!==sp),tg=oth[Math.floor(Math.random()*oth.length)];sd[sp]={target:tg,card:cards[tg]?JSON.parse(JSON.stringify(cards[tg])):null};const cr=Math.random();if(cr<.15){if(!csd[tg])csd[tg]=[];csd[tg].push({level:'full',spyName:sp})}else if(cr<.3){if(!csd[tg])csd[tg]=[];csd[tg].push({level:'partial',spyName:null})}}}const sh=(gs.rn-1)%pl.length;return{cards,manip,bn,pb,pf,curBet:0,order:[...pl.slice(sh),...pl.slice(0,sh)],probs:{},nums,cardCount:cc,pokerIdx:0,actedSinceRaise:new Set(),wheelResult:0,wheelSeed:Math.random(),spinDuration:4200,spiesData:sd,counterSpiesData:csd}}

  else if(a==='bet'){if(!r||gs.phase!=='betting')return;const active=r.order.filter(x=>!r.pf[x]);if(!active.length)return;const cur=active[r.pokerIdx%active.length];if(cur!==f)return;if(p.act==='fold'){r.pf[f]=true;gs.log.push(f+' folded.');Audio.play('fold')}else if(p.act==='call'){const d=Math.min(r.curBet-(r.pb[f]||0),gs.chips[f]);r.pb[f]=(r.pb[f]||0)+d;gs.chips[f]-=d;gs.log.push(gs.chips[f]===0&&d>0?f+' all-in!':f+' called'+(d>0?' (+'+d+')':''));r.actedSinceRaise.add(f);Audio.play('chip')}else if(p.act==='raise'){let nb=parseInt(p.val);const mA=r.curBet+Math.floor(gs.startChips/2),mF=(r.pb[f]||0)+gs.chips[f];if(nb>mA)nb=mA;if(nb>mF)nb=mF;if(nb>r.curBet){const d=nb-(r.pb[f]||0);r.pb[f]=nb;r.curBet=nb;gs.chips[f]-=d;r.actedSinceRaise=new Set();r.actedSinceRaise.add(f);gs.log.push(gs.chips[f]===0?f+' all-in \u2192 '+nb:f+' raised \u2192 '+nb);Audio.play('chip')}}else if(p.act==='check'){gs.log.push(f+' checked.');r.actedSinceRaise.add(f)}const aN=r.order.filter(x=>!r.pf[x]);if(aN.length<=1){gs.phase='reveal_cards';doReveal(gs);Audio.play('reveal');broadcast();R();return}if(aN.every(x=>r.actedSinceRaise.has(x))&&aN.every(x=>(r.pb[x]||0)>=r.curBet||gs.chips[x]===0)){gs.phase='reveal_cards';doReveal(gs);Audio.play('reveal');broadcast();R();return}const cI=r.order.indexOf(cur);let ni=(cI+1)%r.order.length;let s=0;while((r.pf[r.order[ni]]||(gs.chips[r.order[ni]]===0&&(r.pb[r.order[ni]]||0)>=r.curBet))&&s<r.order.length){ni=(ni+1)%r.order.length;s++}r.pokerIdx=aN.indexOf(r.order[ni]);if(r.pokerIdx<0)r.pokerIdx=0}

  if(gs.phase==='spinning'&&!TUT.active)startWheel(gs);
  if(gs.phase==='reveal_dice')setTimeout(()=>{const fw=document.getElementById('fw');if(fw&&r){const nums=r.nums,seg=360/nums.length,ri=nums.indexOf(r.wheelResult),sc=ri*seg+seg/2,j=(r.wheelSeed-.5)*seg*.6;drawWheel(fw,nums,r.probs,(360-sc)+j,r.wheelResult)}},60)}
function renderPB(pr,nums,hl){const nc=getNC(nums);let h=`<div class="pbw"><div class="pbr">`;nums.forEach((n,i)=>{const p=pr[n]||0,hi=hl===n;h+=`<div class="pbc"><div class="pbn" style="color:${nc[i]}${hi?';text-shadow:0 0 10px '+nc[i]:''}">${n}</div><div class="pbb"><div class="pbf" style="height:${Math.min(p*1.8,100)}%;background:${nc[i]};opacity:${hi?1:.3}"></div></div><div class="pbp">${p.toFixed(1)}%</div></div>`});return h+'</div></div>'}
function renderMenu(){document.getElementById('hud').innerHTML=`<div class="ht"></div><div class="hm"><div class="cp g2"><svg width="44" height="44" viewBox="0 0 32 32" fill="none" stroke="var(--blood)" stroke-width="1" style="margin-bottom:14px;opacity:.2"><circle cx="16" cy="16" r="14"/><path d="M16 2 L19.5 11.5 L30 11.5 L21.5 18 L25 28 L16 22 L7 28 L10.5 18 L2 11.5 L12.5 11.5 Z"/></svg><div class="title-anim" style="font-family:Cinzel,serif;font-size:26px;font-weight:900;color:var(--bone);margin-bottom:6px;letter-spacing:.1em">The Infernal <span style="color:var(--bh)">Wager</span></div><div class="form-anim"><div class="lb">YOUR NAME</div><input class="inp" id="ni" placeholder="Enter name\u2026" maxlength="12" style="margin-bottom:20px"><div class="acts" style="margin-bottom:8px"><button class="btn btn-vio btn-big" onclick="TUT.start()">\u00D6\u011Fretici</button></div><div class="lb" style="margin-top:16px">CREATE A GAME</div><div class="acts" style="margin-bottom:8px"><button class="btn btn-bl btn-big" onclick="hostLobby()">Open Portal</button></div><div class="rule"><span style="font-family:Cinzel,serif;font-size:12px;letter-spacing:.2em;color:var(--dim)">OR</span></div><div class="lb">JOIN A GAME</div><input class="inp inp-c" id="ci" placeholder="CODE" maxlength="6" style="margin-bottom:14px"><div class="acts"><button class="btn btn-gh btn-big" onclick="joinGame()">Enter Portal</button></div></div></div></div><div class="hb"></div>`}

window.hostLobby=hostLobby;window.joinGame=joinGame;window.tx=window.tx;window.updateLobby=updateLobby;
function init(){W=window.innerWidth;H=window.innerHeight;initFx();initBg();drawTable();seedParticles();(function loop(){updateFx();requestAnimationFrame(loop)})();setInterval(()=>{if(bgCtx)drawTable()},150);renderMenu()}
window.addEventListener('resize',()=>{W=window.innerWidth;H=window.innerHeight;initFx();initBg();drawTable();seedParticles()});init();
</script>
